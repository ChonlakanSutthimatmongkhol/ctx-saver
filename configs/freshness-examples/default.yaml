# Default freshness config (mirrors compiled-in defaults).
# Copy to ~/.config/ctx-saver/config.yaml or .ctx-saver.yaml to customise.
storage:
  # 0 keeps the database unlimited. A positive value evicts least-recently-used
  # outputs down to 90% of the cap while preserving recent rows and decisions.
  max_db_size_mb: 0

hooks:
  # Deny oversized Copilot native reads of non-source reference files.
  # Source-code files are always exempt; 0 disables this check.
  view_deny_threshold_bytes: 131072

summary:
  # Files/outputs smaller than this are returned inline (direct_output).
  # Larger ones are stored with an output_id and summarized.
  #
  # Tuning guideline:
  # - 32768 (default) — fits typical Go/Python files (300-500 lines)
  # - 65536 (aggressive) — keeps medium build outputs inline; uses more
  #   per-turn tokens but eliminates ctx_get_full round-trips
  # - 5120 (legacy v0.5.x) — minimal inline; forces output_id flow early
  auto_index_threshold_bytes: 32768

freshness:
  enabled: true
  default_max_age_seconds: 3600        # 1 hour for unknown sources
  user_confirm_threshold_seconds: 604800  # 7 days → ask user before use

  sources:
    shell:acli:
      max_age_seconds: 300   # 5 min
      auto_refresh: true
    shell:jira:
      max_age_seconds: 300
      auto_refresh: true
    shell:kubectl:
      max_age_seconds: 60    # 1 min — live cluster data
      auto_refresh: true
    shell:docker:
      max_age_seconds: 60
      auto_refresh: true
    shell:git:
      max_age_seconds: 120   # 2 min — may change on push
      auto_refresh: false
    shell:flutter:
      max_age_seconds: 600   # 10 min — build output
      auto_refresh: false
    shell:go:
      max_age_seconds: 600
      auto_refresh: false
    shell:npm:
      max_age_seconds: 600
      auto_refresh: false

knowledge:
  # Minimum distinct sessions before project-knowledge.md is generated.
  min_sessions: 3
  # Minutes of inactivity before MCP server auto-refreshes knowledge. 0 = disabled.
  idle_minutes: 30
  # Maximum rows per section in project-knowledge.md.
  top_files_limit: 10
  top_commands_limit: 10
  decisions_limit: 10

redaction:
  # Scrub well-known secrets (private keys, AWS keys, GitHub/GitLab/Slack tokens,
  # JWTs, Bearer tokens, generic key=value secrets) from output BEFORE it is
  # summarized, returned, or stored. Replacements are [REDACTED:<rule>].
  # On by default; set to false to disable entirely.
  enabled: true
  # Optional user-defined rules, merged after the built-in defaults.
  # Invalid regexes are logged and skipped (they never fail startup).
  extra_patterns:
    - name: internal_ticket
      regex: 'INT-[0-9]{6}'
