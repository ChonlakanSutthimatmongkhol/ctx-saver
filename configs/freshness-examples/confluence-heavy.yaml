# For repos where Confluence / spec fetches dominate the session.
# Long TTLs because specs change infrequently; no auto-refresh to avoid
# hammering the Confluence API on every retrieval.
summary:
  # Files/outputs smaller than this are returned inline (direct_output).
  # Larger ones are stored with an output_id and summarized.
  #
  # Tuning guideline:
  # - 32768 (default) — fits typical Go/Python files (300-500 lines)
  # - 65536 (aggressive) — keeps medium build outputs inline; uses more
  #   per-turn tokens but eliminates ctx_get_full round-trips
  # - 5120 (legacy v0.5.x) — minimal inline; forces output_id flow early
  auto_index_threshold_bytes: 32768

freshness:
  enabled: true
  default_max_age_seconds: 86400       # 24 hours for general commands
  user_confirm_threshold_seconds: 1209600  # 14 days for specs

  sources:
    shell:acli:
      max_age_seconds: 3600   # 1 hour — specs rarely change mid-session
      auto_refresh: false
    shell:jira:
      max_age_seconds: 1800
      auto_refresh: false
    shell:kubectl:
      max_age_seconds: 300
      auto_refresh: true
    shell:git:
      max_age_seconds: 300
      auto_refresh: false

knowledge:
  # Refresh after 60 min idle — Confluence sessions tend to be longer.
  min_sessions: 3
  idle_minutes: 60
  top_files_limit: 10
  top_commands_limit: 10
  decisions_limit: 10
